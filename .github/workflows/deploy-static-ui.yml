name: Deploy static UI

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      stage:
        description: "Deployment stage"
        required: true
        default: "staging"
        type: choice
        options:
          - staging

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-static-ui-staging
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::329425487030:role/apoth-staging-github-oidc-cdk-deploy
  APOTH_STAGE: staging
  STACK_NAME: Apoth-staging-ServerlessPlatform

jobs:
  deploy:
    name: Publish static UI to staging
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check trusted branch
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "The staging OIDC role currently trusts only refs/heads/main."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve staging stack outputs
        run: |
          set -euo pipefail

          outputs_json="$(aws cloudformation describe-stacks \
            --region "${AWS_REGION}" \
            --stack-name "${STACK_NAME}" \
            --query 'Stacks[0].Outputs' \
            --output json)"

          get_output() {
            jq -r --arg key "$1" '.[] | select(.OutputKey == $key) | .OutputValue // empty' \
              <<<"${outputs_json}"
          }

          static_bucket_name="$(get_output StaticAssetsBucketName)"
          patient_app_bucket_name="$(get_output PatientAppBucketName)"
          static_distribution_domain="$(get_output StaticWebDistributionDomainName)"
          static_distribution_id="$(get_output StaticWebDistributionId)"
          cognito_user_pool_id="$(get_output PatientUserPoolId)"
          cognito_user_pool_client_id="$(get_output PatientUserPoolClientId)"

          for name in \
            static_bucket_name \
            patient_app_bucket_name \
            static_distribution_domain \
            static_distribution_id \
            cognito_user_pool_id \
            cognito_user_pool_client_id
          do
            if [ -z "${!name}" ]; then
              echo "Missing required CloudFormation output: ${name}"
              exit 1
            fi
          done

          {
            echo "STATIC_BUCKET_NAME=${static_bucket_name}"
            echo "PATIENT_APP_BUCKET_NAME=${patient_app_bucket_name}"
            echo "STATIC_DISTRIBUTION_DOMAIN=${static_distribution_domain}"
            echo "STATIC_DISTRIBUTION_ID=${static_distribution_id}"
            echo "APOTH_STAGE=${APOTH_STAGE}"
            echo "NEXT_PUBLIC_COGNITO_REGION=${AWS_REGION}"
            echo "NEXT_PUBLIC_COGNITO_USER_POOL_ID=${cognito_user_pool_id}"
            echo "NEXT_PUBLIC_COGNITO_USER_POOL_CLIENT_ID=${cognito_user_pool_client_id}"
            echo "VITE_COGNITO_REGION=${AWS_REGION}"
            echo "VITE_COGNITO_USER_POOL_ID=${cognito_user_pool_id}"
            echo "VITE_COGNITO_USER_POOL_CLIENT_ID=${cognito_user_pool_client_id}"
            echo "NEXT_PUBLIC_SITE_URL=https://${static_distribution_domain}"
          } >>"${GITHUB_ENV}"

      - name: Build static artifacts
        run: npm run build:static

      - name: Build patient app artifact
        run: npm run patient:build

      - name: Prepare patient app route fallback
        run: cp dist/patient-app/index.html dist/patient-app/patient-index.html

      - name: Verify static artifact routes
        run: |
          set -euo pipefail
          test -f out/index.html
          test -f out/about/index.html
          test -f out/privacy/index.html
          test -f out/terms/index.html
          test -f dist/patient-app/index.html
          test -f dist/patient-app/patient-index.html
          test -d dist/patient-app/patient-assets

      - name: Back up current deployed static UI
        id: backup
        run: |
          set -euo pipefail
          rollback_root="${RUNNER_TEMP}/apoth-static-ui-rollback"
          rm -rf "${rollback_root}"
          mkdir -p "${rollback_root}/marketing" "${rollback_root}/patient"

          aws s3 sync "s3://${STATIC_BUCKET_NAME}/" "${rollback_root}/marketing/" \
            --only-show-errors
          aws s3 sync "s3://${PATIENT_APP_BUCKET_NAME}/" "${rollback_root}/patient/" \
            --only-show-errors

          {
            echo "ROLLBACK_ROOT=${rollback_root}"
          } >>"${GITHUB_ENV}"
          echo "ready=true" >>"${GITHUB_OUTPUT}"

      - name: Sync marketing artifact to S3
        run: |
          aws s3 sync out/ "s3://${STATIC_BUCKET_NAME}/" \
            --delete \
            --only-show-errors

      - name: Sync patient app artifact to S3
        run: |
          aws s3 sync dist/patient-app/ "s3://${PATIENT_APP_BUCKET_NAME}/" \
            --delete \
            --only-show-errors

      - name: Invalidate CloudFront
        id: invalidate
        run: |
          set -euo pipefail
          invalidation_id="$(aws cloudfront create-invalidation \
            --distribution-id "${STATIC_DISTRIBUTION_ID}" \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)"
          echo "invalidation_id=${invalidation_id}" >>"${GITHUB_OUTPUT}"

      - name: Wait for invalidation
        run: |
          aws cloudfront wait invalidation-completed \
            --distribution-id "${STATIC_DISTRIBUTION_ID}" \
            --id "${{ steps.invalidate.outputs.invalidation_id }}"

      - name: Smoke test CloudFront routes
        run: |
          set -euo pipefail
          base_url="https://${STATIC_DISTRIBUTION_DOMAIN}"

          curl --fail --silent --show-error "${base_url}/" >/dev/null
          curl --fail --silent --show-error "${base_url}/about" >/dev/null
          curl --fail --silent --show-error "${base_url}/dashboard" >/dev/null
          curl --fail --silent --show-error "${base_url}/onboarding/mdi" >/dev/null

          api_status="$(curl --silent --show-error --request DELETE \
            --output /tmp/apoth-api-smoke.json \
            --write-out '%{http_code}' \
            "${base_url}/api/auth/session")"
          if [ "${api_status}" = "200" ]; then
            grep -q '"status":"session_cleared"' /tmp/apoth-api-smoke.json
            exit 0
          fi
          echo "Expected /api/auth/session DELETE to route to API Gateway and clear the session, got ${api_status}."
          if grep -qi '<html' /tmp/apoth-api-smoke.json; then
            echo "Response looked like static HTML, so /api/* may not be routing to API Gateway."
          fi
          cat /tmp/apoth-api-smoke.json
          exit 1

      - name: Run Playwright E2E against CloudFront
        run: |
          PLAYWRIGHT_MARKETING_BASE_URL="https://${STATIC_DISTRIBUTION_DOMAIN}" \
          PLAYWRIGHT_PATIENT_BASE_URL="https://${STATIC_DISTRIBUTION_DOMAIN}" \
            npm run test:e2e -- --workers=2

      - name: Roll back static UI deployment
        if: failure() && steps.backup.outputs.ready == 'true'
        run: |
          set -euo pipefail
          aws s3 sync "${ROLLBACK_ROOT}/marketing/" "s3://${STATIC_BUCKET_NAME}/" \
            --delete \
            --only-show-errors
          aws s3 sync "${ROLLBACK_ROOT}/patient/" "s3://${PATIENT_APP_BUCKET_NAME}/" \
            --delete \
            --only-show-errors

          rollback_invalidation_id="$(aws cloudfront create-invalidation \
            --distribution-id "${STATIC_DISTRIBUTION_ID}" \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)"
          aws cloudfront wait invalidation-completed \
            --distribution-id "${STATIC_DISTRIBUTION_ID}" \
            --id "${rollback_invalidation_id}"

          echo "Rolled back static UI buckets to the pre-deploy snapshot."

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: post-deploy-playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
